swagger: "2.0"
info:
  title: DocGuard AI API
  description: |
    AI-powered document compliance analysis platform with multi-tenant support.

    ## Authentication
    All `/api/` endpoints require a Bearer token:
    ```
    Authorization: Bearer sk-your-key-here
    ```
    Click **Authorize** (🔒) above and enter your key.
  version: "1.0.0"
  contact:
    name: DocGuard AI

basePath: /api
consumes:
  - application/json
produces:
  - application/json

securityDefinitions:
  BearerAuth:
    type: apiKey
    in: header
    name: Authorization
    description: "Enter: **Bearer sk-your-key-here**"

security:
  - BearerAuth: []

tags:
  - name: Documents
    description: Upload, list, and manage compliance documents
  - name: Analysis
    description: View and run AI analysis results
  - name: Batch
    description: Upload and analyze multiple documents at once
  - name: Chat
    description: Knowledge base chat and document generation
  - name: Knowledge Base
    description: Manage the vector knowledge base
  - name: Frameworks
    description: Compliance framework standards (ISO 27001, SOC 2, etc.)
  - name: History & Stats
    description: Analysis history, score trends, and token usage
  - name: Settings
    description: LLM provider selection and Ollama management
  - name: Admin
    description: Tenant and key management (is_admin required)
  - name: Provisioning
    description: Auto-provision tenants (SaaS integration, secured with master key)

# ============================================================
# PROVISIONING — SaaS Integration
# ============================================================
paths:
  /provision:
    post:
      tags: [Provisioning]
      summary: Auto-provision a new tenant
      description: |
        Called by your SaaS backend when a new customer signs up.
        Creates the tenant, its first API key (with expiration), and a refresh token.

        **No Bearer auth needed** — this is a public provisioning endpoint.
        **Idempotent:** If the slug already exists, returns the existing tenant (200).
      security: []
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [name, slug]
            properties:
              name:
                type: string
                example: Acme Corp
              slug:
                type: string
                example: acme-corp
                description: URL-safe unique identifier (lowercase, hyphens)
              expires_in_days:
                type: integer
                default: 90
                description: API key validity in days (default 90)
      responses:
        201:
          description: Tenant created
          schema:
            type: object
            properties:
              tenant:
                $ref: '#/definitions/TenantSummary'
              api_key:
                type: string
                example: sk-xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
              refresh_token:
                type: string
                example: rt-xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
              expires_at:
                type: string
                format: date-time
              created:
                type: boolean
                example: true
              message:
                type: string
        200:
          description: Tenant already exists (idempotent)
          schema:
            type: object
            properties:
              tenant:
                $ref: '#/definitions/TenantSummary'
              api_key:
                type: string
              refresh_token:
                type: string
              expires_at:
                type: string
                format: date-time
              is_expired:
                type: boolean
              created:
                type: boolean
                example: false
              message:
                type: string
        400:
          description: Missing name or slug

  /refresh-key:
    post:
      tags: [Provisioning]
      summary: Rotate an API key using a refresh token
      description: |
        Generates a new API key, a new refresh token (one-time use), and
        resets the expiration. The old key and refresh token are invalidated.

        **No Bearer auth needed** — uses the refresh token for authentication.
      security: []
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [refresh_token]
            properties:
              refresh_token:
                type: string
                example: rt-xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
              expires_in_days:
                type: integer
                default: 90
                description: New key validity in days
      responses:
        200:
          description: Key rotated successfully
          schema:
            type: object
            properties:
              api_key:
                type: string
                example: sk-new-xxxx-xxxx-xxxx-xxxxxxxxxxxx
              refresh_token:
                type: string
                example: rt-new-xxxx-xxxx-xxxx-xxxxxxxxxxxx
              expires_at:
                type: string
                format: date-time
              tenant_id:
                type: integer
              message:
                type: string
        400:
          description: Missing refresh_token
        401:
          description: Invalid or already-used refresh token
        403:
          description: Application disabled

  /verify-key:
    post:
      tags: [Provisioning]
      summary: Verify an API key and get tenant info
      description: |
        Checks if an API key is valid, active, and not expired.
        Returns the tenant name and status.

        **No Bearer auth needed** — the API key is passed in the request body.
      security: []
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [api_key]
            properties:
              api_key:
                type: string
                example: sk-xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
      responses:
        200:
          description: Key is valid and active
          schema:
            type: object
            properties:
              valid:
                type: boolean
                example: true
              tenant_name:
                type: string
              tenant_slug:
                type: string
              tenant_id:
                type: integer
              expires_at:
                type: string
                format: date-time
              is_admin:
                type: boolean
        400:
          description: Missing api_key
        401:
          description: Invalid or expired API key
        403:
          description: API key disabled

# ============================================================
# SETTINGS — LLM Provider & Ollama
# ============================================================
  /settings/llm-provider:
    get:
      tags: [Settings]
      summary: Get current LLM provider
      description: Returns the active provider (bedrock or ollama) and available models.
      responses:
        200:
          description: Provider info
          schema:
            type: object
            properties:
              provider:
                type: string
                enum: [bedrock, ollama]
              model:
                type: string
    post:
      tags: [Settings]
      summary: Set LLM provider
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [provider]
            properties:
              provider:
                type: string
                enum: [bedrock, ollama]
              model:
                type: string
                example: mistral:7b
      responses:
        200:
          description: Provider updated

  /ollama/status:
    get:
      tags: [Settings]
      summary: Ollama service status
      description: Checks whether the Ollama service is reachable and lists available models.
      responses:
        200:
          description: Ollama status
          schema:
            type: object
            properties:
              connected:
                type: boolean
              models:
                type: array
                items:
                  type: string

  /ollama/pull:
    post:
      tags: [Settings]
      summary: Pull an Ollama model
      description: Triggers a model download. Returns a streaming SSE response with progress.
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [model]
            properties:
              model:
                type: string
                example: mistral:7b
      responses:
        200:
          description: SSE stream of pull progress

# ============================================================
# DOCUMENTS
# ============================================================
  /documents:
    get:
      tags: [Documents]
      summary: List all documents
      description: Returns all documents belonging to the authenticated tenant.
      responses:
        200:
          description: List of documents
          schema:
            type: object
            properties:
              documents:
                type: array
                items:
                  $ref: '#/definitions/DocumentSummary'
        401:
          $ref: '#/responses/Unauthorized'

  /upload:
    post:
      tags: [Documents]
      summary: Upload and analyze a document
      description: Upload a single document. Analysis runs asynchronously.
      consumes:
        - multipart/form-data
      parameters:
        - name: file
          in: formData
          required: true
          type: file
          description: The document file (PDF, DOCX, TXT, XLSX, CSV)
        - name: document_type
          in: formData
          required: true
          type: string
          enum: [policy, procedure, report, contract, other]
          description: Document type classification
      responses:
        201:
          description: Document queued for analysis
          schema:
            type: object
            properties:
              document_id:
                type: integer
              message:
                type: string
              status:
                type: string
        400:
          description: No file or unsupported extension
        401:
          $ref: '#/responses/Unauthorized'

  /documents/{id}:
    get:
      tags: [Documents]
      summary: Get a single document
      parameters:
        - $ref: '#/parameters/DocId'
      responses:
        200:
          description: Document details
          schema:
            $ref: '#/definitions/DocumentSummary'
        404:
          $ref: '#/responses/NotFound'
    delete:
      tags: [Documents]
      summary: Delete a document
      parameters:
        - $ref: '#/parameters/DocId'
      responses:
        200:
          description: Document deleted
        404:
          $ref: '#/responses/NotFound'

  /documents/{id}/rename:
    patch:
      tags: [Documents]
      summary: Rename a document
      parameters:
        - $ref: '#/parameters/DocId'
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [filename]
            properties:
              filename:
                type: string
                example: updated-policy.pdf
      responses:
        200:
          description: Renamed successfully
        404:
          $ref: '#/responses/NotFound'

  /documents/{id}/save:
    post:
      tags: [Documents]
      summary: Save document to knowledge base
      description: Chunks and indexes the document into the tenant's vector KB.
      parameters:
        - $ref: '#/parameters/DocId'
      responses:
        200:
          description: Saved to KB
        404:
          $ref: '#/responses/NotFound'

# ============================================================
# ANALYSIS
# ============================================================
  /analysis/{id}:
    get:
      tags: [Analysis]
      summary: Get analysis results
      description: Returns full AI analysis (compliance, security, risk, frameworks, gaps, score).
      parameters:
        - $ref: '#/parameters/DocId'
      responses:
        200:
          description: Full analysis results
          schema:
            type: object
            properties:
              analysis:
                type: object
        404:
          $ref: '#/responses/NotFound'

  /analysis/{id}/check-frameworks:
    post:
      tags: [Analysis]
      summary: Run framework comparison
      description: Compares document against uploaded compliance frameworks (ISO 27001, SOC 2, etc.).
      parameters:
        - $ref: '#/parameters/DocId'
        - in: body
          name: body
          schema:
            type: object
            properties:
              frameworks:
                type: array
                items:
                  type: string
                  enum: [ISO27001, SOC2, GDPR, HIPAA, NIST, CIS]
      responses:
        200:
          description: Framework comparison results
        404:
          $ref: '#/responses/NotFound'

# ============================================================
# BATCH
# ============================================================
  /upload-batch:
    post:
      tags: [Batch]
      summary: Upload and analyze multiple documents
      consumes:
        - multipart/form-data
      parameters:
        - name: files
          in: formData
          required: true
          type: array
          items:
            type: file
          description: One or more document files
        - name: document_type
          in: formData
          type: string
          enum: [policy, procedure, report, contract, other]
      responses:
        201:
          description: Batch created
          schema:
            type: object
            properties:
              batch_id:
                type: integer
              message:
                type: string
        401:
          $ref: '#/responses/Unauthorized'

  /batch-analysis/{batchId}:
    get:
      tags: [Batch]
      summary: Get batch analysis results
      parameters:
        - $ref: '#/parameters/BatchId'
      responses:
        200:
          description: Batch analysis details and per-document results
        404:
          $ref: '#/responses/NotFound'
    delete:
      tags: [Batch]
      summary: Delete a batch analysis
      parameters:
        - $ref: '#/parameters/BatchId'
      responses:
        200:
          description: Batch deleted
        404:
          $ref: '#/responses/NotFound'

  /batch-analysis/{batchId}/save-all:
    post:
      tags: [Batch]
      summary: Save all batch documents to knowledge base
      parameters:
        - $ref: '#/parameters/BatchId'
      responses:
        200:
          description: All documents saved to KB

# ============================================================
# CHAT
# ============================================================
  /chat:
    post:
      tags: [Chat]
      summary: Send a knowledge base chat message
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [message]
            properties:
              message:
                type: string
                example: What are the key gaps in our ISO 27001 compliance?
              session_id:
                type: string
                description: Optional session identifier for conversation continuity
      responses:
        200:
          description: AI chat response
          schema:
            type: object
            properties:
              response:
                type: string
              sources:
                type: array
                items:
                  type: string
              confidence:
                type: number

  /chat/history:
    get:
      tags: [Chat]
      summary: Get chat history
      parameters:
        - name: session_id
          in: query
          type: string
      responses:
        200:
          description: Chat history
    delete:
      tags: [Chat]
      summary: Clear chat history
      responses:
        200:
          description: History cleared

  /chat/upload:
    post:
      tags: [Chat]
      summary: Upload a file for chat context
      description: Attaches a document to the chat session as additional context.
      consumes:
        - multipart/form-data
      parameters:
        - name: file
          in: formData
          required: true
          type: file
      responses:
        200:
          description: File attached to session

  /chat/save-file:
    post:
      tags: [Chat]
      summary: Save chat-attached file to knowledge base
      responses:
        200:
          description: Saved to KB

  /chat/clear-file:
    post:
      tags: [Chat]
      summary: Remove attached chat file
      responses:
        200:
          description: File cleared

  /chat/fill-document:
    post:
      tags: [Chat]
      summary: Generate a compliance document
      description: Uses AI to generate a compliance document (policy, procedure, etc.) based on a template and context.
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [template_type]
            properties:
              template_type:
                type: string
                example: information_security_policy
              context:
                type: string
                example: Focus on ISO 27001 A.9 access control requirements
      responses:
        200:
          description: Generated document info
          schema:
            type: object
            properties:
              filename:
                type: string
              download_url:
                type: string

  /chat/download/{filename}:
    get:
      tags: [Chat]
      summary: Download a generated file
      parameters:
        - name: filename
          in: path
          required: true
          type: string
      produces:
        - application/octet-stream
      responses:
        200:
          description: File download

# ============================================================
# KNOWLEDGE BASE
# ============================================================
  /kb/stats:
    get:
      tags: [Knowledge Base]
      summary: Knowledge base statistics
      description: Returns chunk count and document count in the tenant's KB.
      responses:
        200:
          description: KB statistics
          schema:
            type: object
            properties:
              total_chunks:
                type: integer
              total_documents:
                type: integer

  /kb/reindex:
    post:
      tags: [Knowledge Base]
      summary: Re-index knowledge base
      description: Rebuilds the vector index for all documents in the KB. Runs in background.
      responses:
        202:
          description: Reindex started

  /kb/reindex/status:
    get:
      tags: [Knowledge Base]
      summary: Reindex progress
      responses:
        200:
          description: Progress info
          schema:
            type: object
            properties:
              status:
                type: string
                enum: [idle, running, done, error]
              progress:
                type: integer
              total:
                type: integer

# ============================================================
# FRAMEWORKS
# ============================================================
  /frameworks:
    get:
      tags: [Frameworks]
      summary: List uploaded framework standards
      responses:
        200:
          description: Frameworks by key
          schema:
            type: object
            properties:
              frameworks:
                type: object

  /frameworks/status:
    get:
      tags: [Frameworks]
      summary: Framework upload status
      description: Which standard PDFs have been uploaded for the tenant.
      responses:
        200:
          description: Upload status per framework key

  /frameworks/upload:
    post:
      tags: [Frameworks]
      summary: Upload a framework standard
      consumes:
        - multipart/form-data
      parameters:
        - name: file
          in: formData
          required: true
          type: file
          description: The standard PDF (e.g. ISO 27001:2022)
        - name: framework_key
          in: formData
          required: true
          type: string
          enum: [ISO27001, SOC2, GDPR, HIPAA, NIST, CIS]
        - name: version
          in: formData
          type: string
          example: "2022"
      responses:
        201:
          description: Framework uploaded and indexed
        400:
          description: Missing fields or unsupported file type

  /frameworks/{id}:
    delete:
      tags: [Frameworks]
      summary: Delete a framework standard
      parameters:
        - name: id
          in: path
          required: true
          type: integer
      responses:
        200:
          description: Framework deleted

# ============================================================
# HISTORY & STATS
# ============================================================
  /history:
    get:
      tags: [History & Stats]
      summary: Analysis history
      description: Returns all single-document and batch analyses for the tenant.
      responses:
        200:
          description: History list

  /trends:
    get:
      tags: [History & Stats]
      summary: Historical score trends
      description: Returns per-framework score trends over time.
      responses:
        200:
          description: Trend data

  /stats:
    get:
      tags: [History & Stats]
      summary: Token usage statistics
      description: Returns Bedrock token usage counters for the tenant.
      responses:
        200:
          description: Token stats
          schema:
            type: object
            properties:
              total_tokens:
                type: integer
              input_tokens:
                type: integer
              output_tokens:
                type: integer

  /stats/reset:
    post:
      tags: [History & Stats]
      summary: Reset token counters
      responses:
        200:
          description: Counters reset

# ============================================================
# ADMIN — requires is_admin flag
# ============================================================
  /admin/tenants:
    get:
      tags: [Admin]
      summary: List all tenants
      description: "⚠️ Requires `is_admin` flag on the API key."
      responses:
        200:
          description: Tenant list
          schema:
            type: object
            properties:
              tenants:
                type: array
                items:
                  $ref: '#/definitions/TenantSummary'
        403:
          $ref: '#/responses/Forbidden'
    post:
      tags: [Admin]
      summary: Create a tenant
      description: "⚠️ Requires `is_admin` flag on the API key."
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [name, slug]
            properties:
              name:
                type: string
                example: Acme Corp
              slug:
                type: string
                example: acme-corp
      responses:
        201:
          description: Tenant created with first API key
          schema:
            type: object
            properties:
              tenant:
                $ref: '#/definitions/TenantSummary'
              first_api_key:
                type: string
        403:
          $ref: '#/responses/Forbidden'

  /admin/tenants/{tenantId}:
    patch:
      tags: [Admin]
      summary: Update tenant
      description: "⚠️ Requires `is_admin` flag on the API key."
      parameters:
        - name: tenantId
          in: path
          required: true
          type: integer
        - in: body
          name: body
          schema:
            type: object
            properties:
              name:
                type: string
              is_active:
                type: boolean
      responses:
        200:
          description: Tenant updated
        403:
          $ref: '#/responses/Forbidden'
        404:
          $ref: '#/responses/NotFound'

  /admin/tenants/{tenantId}/keys:
    get:
      tags: [Admin]
      summary: List API keys for a tenant
      description: "⚠️ Requires `is_admin` flag on the API key."
      parameters:
        - name: tenantId
          in: path
          required: true
          type: integer
      responses:
        200:
          description: Keys list
          schema:
            type: object
            properties:
              keys:
                type: array
                items:
                  $ref: '#/definitions/AppDetail'
        403:
          $ref: '#/responses/Forbidden'
    post:
      tags: [Admin]
      summary: Create an API key for a tenant
      description: "⚠️ Requires `is_admin` flag on the API key."
      parameters:
        - name: tenantId
          in: path
          required: true
          type: integer
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [name]
            properties:
              name:
                type: string
                example: Production Key
              is_admin:
                type: boolean
                default: false
      responses:
        201:
          description: New API key created
          schema:
            $ref: '#/definitions/AppDetail'
        403:
          $ref: '#/responses/Forbidden'

  /admin/tenants/{tenantId}/keys/{keyId}:
    delete:
      tags: [Admin]
      summary: Revoke a tenant API key
      description: "⚠️ Requires `is_admin` flag on the API key."
      parameters:
        - name: tenantId
          in: path
          required: true
          type: integer
        - name: keyId
          in: path
          required: true
          type: integer
      responses:
        200:
          description: Key revoked
        403:
          $ref: '#/responses/Forbidden'
        404:
          $ref: '#/responses/NotFound'

# ============================================================
# REUSABLE COMPONENTS
# ============================================================
parameters:
  DocId:
    name: id
    in: path
    required: true
    type: integer
    description: Document ID
  BatchId:
    name: batchId
    in: path
    required: true
    type: integer
    description: Batch analysis ID

responses:
  Unauthorized:
    description: Missing or invalid API key
    schema:
      $ref: '#/definitions/Error'
  Forbidden:
    description: Admin access required
    schema:
      $ref: '#/definitions/Error'
  NotFound:
    description: Resource not found
    schema:
      $ref: '#/definitions/Error'

definitions:
  Error:
    type: object
    properties:
      error:
        type: string
      message:
        type: string

  DocumentSummary:
    type: object
    properties:
      id:
        type: integer
      filename:
        type: string
      document_type:
        type: string
      status:
        type: string
        enum: [pending, processing, completed, failed]
      has_analysis:
        type: boolean
      is_saved:
        type: boolean
      file_size:
        type: integer
      upload_date:
        type: string
        format: date-time

  AppSummary:
    type: object
    properties:
      id:
        type: integer
      name:
        type: string
      is_active:
        type: boolean
      is_admin:
        type: boolean
      created_at:
        type: string
        format: date-time
      last_used:
        type: string
        format: date-time
      expires_at:
        type: string
        format: date-time
        description: "Null if key never expires"
      is_expired:
        type: boolean

  AppDetail:
    allOf:
      - $ref: '#/definitions/AppSummary'
      - type: object
        properties:
          api_key:
            type: string
            example: sk-xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
          refresh_token:
            type: string
            example: rt-xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx

  TenantSummary:
    type: object
    properties:
      id:
        type: integer
      name:
        type: string
      slug:
        type: string
      is_active:
        type: boolean
      created_at:
        type: string
        format: date-time
