version: '3.8'

services:
  # ---- PostgreSQL + pgvector ----
  doc-analyzer-db:
    image: pgvector/pgvector:pg16
    container_name: doc-analyzer-db-v2
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-document_analyzer}
    ports:
      - "5435:5432" # Dev only — remove in production
    volumes:
      - doc_analyzer_v2_db:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-document_analyzer}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - doc-analyzer-v2
    restart: unless-stopped

  # ---- Flask Backend ----
  doc-analyzer-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: doc-analyzer-backend-v2
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@doc-analyzer-db:5432/${POSTGRES_DB:-document_analyzer}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_BEARER_TOKEN_BEDROCK: ${AWS_BEARER_TOKEN_BEDROCK:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      BEDROCK_MODEL_ID: ${BEDROCK_MODEL_ID:-apac.amazon.nova-lite-v1:0}
      UPLOAD_FOLDER: /app/uploads
      DEBUG: ${DEBUG:-False}
      ANONYMIZED_TELEMETRY: 'False'
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-change-me-in-env}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-env}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral:7b}
      PROVISIONING_MASTER_KEY: ${PROVISIONING_MASTER_KEY:-CHANGE-ME-set-PROVISIONING_MASTER_KEY-in-env}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-sk-change-me-in-production}
      CELERY_BROKER_URL: redis://doc-analyzer-redis:6379/1
    # ports:
    #   - "5002:5000" # Dev only — remove in production
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - doc_analyzer_v2_uploads:/app/uploads
      - doc_analyzer_v2_model_cache:/root/.cache
    depends_on:
      doc-analyzer-db:
        condition: service_healthy
      doc-analyzer-redis:
        condition: service_started
    networks:
      - doc-analyzer-v2
    restart: unless-stopped

  # ---- Nginx Frontend ----
  doc-analyzer-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: doc-analyzer-frontend-v2
    environment:
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-change-me-in-env}
    ports:
      #   - "3001:80"
      - "80:80"
    depends_on:
      - doc-analyzer-backend
    networks:
      - doc-analyzer-v2
    restart: unless-stopped

  # ---- Ollama (Local LLM) ----
  ollama:
    image: ollama/ollama:latest
    container_name: doc-analyzer-ollama
    ports:
      - "11434:11434" # Dev only — remove in production
    volumes:
      - doc_analyzer_v2_ollama:/root/.ollama
    networks:
      - doc-analyzer-v2
    restart: unless-stopped

  # ---- Redis (Celery Broker) ----
  doc-analyzer-redis:
    image: redis:7-alpine
    container_name: doc-analyzer-redis
    ports:
      - "6380:6379" # Dev only — remove in production
    volumes:
      - doc_analyzer_v2_redis:/data
    networks:
      - doc-analyzer-v2
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Celery Worker (Background Task Processing) ----
  doc-analyzer-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: doc-analyzer-worker
    command: [ "celery", "-A", "celery_app", "worker", "--loglevel=info", "--concurrency=2" ]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@doc-analyzer-db:5432/${POSTGRES_DB:-document_analyzer}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_BEARER_TOKEN_BEDROCK: ${AWS_BEARER_TOKEN_BEDROCK:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      BEDROCK_MODEL_ID: ${BEDROCK_MODEL_ID:-apac.amazon.nova-lite-v1:0}
      UPLOAD_FOLDER: /app/uploads
      ANONYMIZED_TELEMETRY: 'False'
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral:7b}
      CELERY_BROKER_URL: redis://doc-analyzer-redis:6379/1
    volumes:
      - doc_analyzer_v2_uploads:/app/uploads
      - doc_analyzer_v2_model_cache:/root/.cache
    depends_on:
      doc-analyzer-db:
        condition: service_healthy
      doc-analyzer-redis:
        condition: service_started
    networks:
      - doc-analyzer-v2
    restart: unless-stopped

  # ---- pgAdmin (PostgreSQL GUI) ----
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: doc-analyzer-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@docguard.ai}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "5050:80"
    depends_on:
      - doc-analyzer-db
    volumes:
      - doc_analyzer_v2_pgadmin:/var/lib/pgadmin
    networks:
      - doc-analyzer-v2
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

volumes:
  doc_analyzer_v2_db:
    driver: local
  doc_analyzer_v2_uploads:
    driver: local
  doc_analyzer_v2_ollama:
    driver: local
  doc_analyzer_v2_redis:
    driver: local
  doc_analyzer_v2_model_cache:
    driver: local
  doc_analyzer_v2_pgadmin:
    driver: local

networks:
  doc-analyzer-v2:
    driver: bridge
