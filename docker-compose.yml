version: '3.8'

services:
  # ---- PostgreSQL ----
  doc-analyzer-db:
    image: postgres:16
    container_name: doc-analyzer-db-v2
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-document_analyzer}
    ports:
      - "5435:5432" # Dev only — remove in production
    volumes:
      - doc_analyzer_v2_db:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-document_analyzer}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - doc-analyzer-v2

  # ---- Flask Backend ----
  doc-analyzer-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: doc-analyzer-backend-v2
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@doc-analyzer-db:5432/${POSTGRES_DB:-document_analyzer}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_BEARER_TOKEN_BEDROCK: ${AWS_BEARER_TOKEN_BEDROCK:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      BEDROCK_MODEL_ID: ${BEDROCK_MODEL_ID:-apac.amazon.nova-lite-v1:0}
      UPLOAD_FOLDER: /app/uploads
      DEBUG: ${DEBUG:-False}
      ANONYMIZED_TELEMETRY: 'False'
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-change-me-in-env}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-env}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral:7b}
      PROVISIONING_MASTER_KEY: ${PROVISIONING_MASTER_KEY:-CHANGE-ME-set-PROVISIONING_MASTER_KEY-in-env}
      CHROMA_HOST: doc-analyzer-chromadb
      CHROMA_PORT: "8000"
    ports:
      - "5002:5000" # Dev only — remove in production
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - doc_analyzer_v2_uploads:/app/uploads
    depends_on:
      doc-analyzer-db:
        condition: service_healthy
      doc-analyzer-chromadb:
        condition: service_started
    networks:
      - doc-analyzer-v2
    restart: unless-stopped

  # ---- Nginx Frontend ----
  doc-analyzer-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: doc-analyzer-frontend-v2
    environment:
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-change-me-in-env}
    ports:
      - "3001:80"
    depends_on:
      - doc-analyzer-backend
    networks:
      - doc-analyzer-v2
    restart: unless-stopped

  # ---- Ollama (Local LLM) ----
  ollama:
    image: ollama/ollama:latest
    container_name: doc-analyzer-ollama
    ports:
      - "11434:11434" # Dev only — remove in production
    volumes:
      - doc_analyzer_v2_ollama:/root/.ollama
    networks:
      - doc-analyzer-v2
    restart: unless-stopped

  # ---- ChromaDB Server (Vector Store) ----
  doc-analyzer-chromadb:
    image: chromadb/chroma:0.4.24
    container_name: doc-analyzer-chromadb
    environment:
      ANONYMIZED_TELEMETRY: 'False'
      IS_PERSISTENT: 'TRUE'
      PERSIST_DIRECTORY: /chroma/chroma
    volumes:
      - doc_analyzer_v2_chromadb:/chroma/chroma
    ports:
      - "8100:8000" # Dev only — remove in production
    networks:
      - doc-analyzer-v2
    restart: unless-stopped

volumes:
  doc_analyzer_v2_db:
    driver: local
  doc_analyzer_v2_uploads:
    driver: local
  doc_analyzer_v2_chromadb:
    driver: local
  doc_analyzer_v2_ollama:
    driver: local

networks:
  doc-analyzer-v2:
    driver: bridge
