<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DocGuard AI — API Documentation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
    <style>
        :root {
            --bg-primary: #0f1117;
            --bg-secondary: #1a1d2e;
            --bg-card: #1e2235;
            --accent: #a78bfa;
            --accent-secondary: #6366f1;
            --text-primary: #e2e8f0;
            --text-muted: #94a3b8;
            --border: #2d3148;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        /* ---- Header Bar ---- */
        .docguard-header {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, #12142a 100%);
            border-bottom: 1px solid var(--border);
            padding: 20px 32px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .docguard-header .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #fff;
        }

        .docguard-header h1 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #c4b5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .docguard-header .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-left: auto;
        }

        .docguard-header .back-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.85rem;
            margin-left: 12px;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .docguard-header .back-link:hover {
            opacity: 1;
        }

        /* ---- Swagger UI Theme Overrides ---- */
        #swagger-ui {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px 60px;
        }

        .swagger-ui {
            font-family: 'Inter', sans-serif !important;
        }

        /* Hide default top bar */
        .swagger-ui .topbar {
            display: none !important;
        }

        /* Info section */
        .swagger-ui .info {
            margin: 24px 0 16px !important;
        }

        .swagger-ui .info .title {
            color: var(--text-primary) !important;
            font-size: 1.6rem !important;
        }

        .swagger-ui .info .description p,
        .swagger-ui .info .description {
            color: var(--text-muted) !important;
        }

        .swagger-ui .info a {
            color: var(--accent) !important;
        }

        .swagger-ui .info .base-url {
            color: var(--text-muted) !important;
        }

        /* Scheme container */
        .swagger-ui .scheme-container {
            background: var(--bg-secondary) !important;
            border: 1px solid var(--border) !important;
            border-radius: 10px !important;
            padding: 16px 20px !important;
            margin: 0 0 20px !important;
            box-shadow: none !important;
        }

        /* Tags / sections */
        .swagger-ui .opblock-tag {
            color: var(--text-primary) !important;
            border-bottom: 1px solid var(--border) !important;
            font-weight: 600 !important;
        }

        .swagger-ui .opblock-tag:hover {
            background: rgba(167, 139, 250, 0.05) !important;
        }

        .swagger-ui .opblock-tag small {
            color: var(--text-muted) !important;
        }

        /* Endpoint rows */
        .swagger-ui .opblock {
            border-radius: 8px !important;
            border: 1px solid var(--border) !important;
            margin: 0 0 6px !important;
            background: var(--bg-card) !important;
            box-shadow: none !important;
        }

        .swagger-ui .opblock .opblock-summary {
            border: none !important;
            padding: 10px 16px !important;
        }

        .swagger-ui .opblock .opblock-summary-description {
            color: var(--text-muted) !important;
            font-size: 0.85rem !important;
        }

        .swagger-ui .opblock .opblock-summary-path {
            color: var(--text-primary) !important;
        }

        /* Method badges */
        .swagger-ui .opblock.opblock-get {
            border-color: rgba(34, 197, 94, 0.3) !important;
            background: rgba(34, 197, 94, 0.05) !important;
        }

        .swagger-ui .opblock.opblock-get .opblock-summary-method {
            background: var(--success) !important;
        }

        .swagger-ui .opblock.opblock-post {
            border-color: rgba(99, 102, 241, 0.3) !important;
            background: rgba(99, 102, 241, 0.05) !important;
        }

        .swagger-ui .opblock.opblock-post .opblock-summary-method {
            background: var(--accent-secondary) !important;
        }

        .swagger-ui .opblock.opblock-delete {
            border-color: rgba(239, 68, 68, 0.3) !important;
            background: rgba(239, 68, 68, 0.05) !important;
        }

        .swagger-ui .opblock.opblock-delete .opblock-summary-method {
            background: var(--danger) !important;
        }

        .swagger-ui .opblock.opblock-patch {
            border-color: rgba(245, 158, 11, 0.3) !important;
            background: rgba(245, 158, 11, 0.05) !important;
        }

        .swagger-ui .opblock.opblock-patch .opblock-summary-method {
            background: var(--warning) !important;
        }

        .swagger-ui .opblock .opblock-summary-method {
            border-radius: 6px !important;
            font-weight: 600 !important;
            font-size: 0.75rem !important;
            padding: 4px 12px !important;
            min-width: 70px !important;
            text-align: center !important;
        }

        /* Expanded body */
        .swagger-ui .opblock-body {
            background: var(--bg-secondary) !important;
        }

        .swagger-ui .opblock-body pre {
            background: var(--bg-primary) !important;
            color: var(--text-primary) !important;
            border-radius: 6px !important;
        }

        .swagger-ui .opblock-section-header {
            background: var(--bg-card) !important;
            border-bottom: 1px solid var(--border) !important;
        }

        .swagger-ui .opblock-section-header h4 {
            color: var(--text-primary) !important;
        }

        /* Tables */
        .swagger-ui table thead tr th {
            color: var(--text-muted) !important;
            border-bottom: 1px solid var(--border) !important;
        }

        .swagger-ui table tbody tr td {
            color: var(--text-primary) !important;
            border-bottom: 1px solid var(--border) !important;
        }

        .swagger-ui .parameter__name {
            color: var(--text-primary) !important;
        }

        .swagger-ui .parameter__type {
            color: var(--accent) !important;
        }

        .swagger-ui .parameter__in {
            color: var(--text-muted) !important;
            font-size: 0.8rem !important;
        }

        /* Inputs */
        .swagger-ui input[type=text],
        .swagger-ui textarea,
        .swagger-ui select {
            background: var(--bg-primary) !important;
            color: var(--text-primary) !important;
            border: 1px solid var(--border) !important;
            border-radius: 6px !important;
        }

        /* Buttons */
        .swagger-ui .btn {
            border-radius: 6px !important;
            font-weight: 500 !important;
        }

        .swagger-ui .btn.execute {
            background: var(--accent-secondary) !important;
            border-color: var(--accent-secondary) !important;
            color: #fff !important;
        }

        .swagger-ui .btn.execute:hover {
            background: var(--accent) !important;
        }

        .swagger-ui .btn.authorize {
            color: var(--accent) !important;
            border-color: var(--accent) !important;
        }

        .swagger-ui .btn.authorize svg {
            fill: var(--accent) !important;
        }

        /* Authorize modal */
        .swagger-ui .dialog-ux .modal-ux {
            background: var(--bg-secondary) !important;
            border: 1px solid var(--border) !important;
            border-radius: 12px !important;
        }

        .swagger-ui .dialog-ux .modal-ux-header h3 {
            color: var(--text-primary) !important;
        }

        .swagger-ui .dialog-ux .modal-ux-content p {
            color: var(--text-muted) !important;
        }

        /* Models section */
        .swagger-ui .model-box {
            background: var(--bg-card) !important;
        }

        .swagger-ui .model {
            color: var(--text-primary) !important;
        }

        .swagger-ui .model-title {
            color: var(--text-primary) !important;
        }

        /* Responses */
        .swagger-ui .responses-inner h4 {
            color: var(--text-primary) !important;
        }

        .swagger-ui .response-col_status {
            color: var(--accent) !important;
        }

        .swagger-ui .response-col_description {
            color: var(--text-muted) !important;
        }

        /* Filter */
        .swagger-ui .filter .operation-filter-input {
            background: var(--bg-secondary) !important;
            border: 1px solid var(--border) !important;
            border-radius: 8px !important;
            color: var(--text-primary) !important;
            padding: 10px 16px !important;
        }

        /* Auth lock icons */
        .swagger-ui .authorization__btn svg {
            fill: var(--accent) !important;
        }

        .swagger-ui .unlocked svg {
            fill: var(--text-muted) !important;
        }

        /* Loading */
        .swagger-ui .loading-container .loading::after {
            color: var(--text-muted) !important;
        }

        /* Code highlighting */
        .swagger-ui .highlight-code {
            background: var(--bg-primary) !important;
        }

        .swagger-ui .microlight {
            background: var(--bg-primary) !important;
            color: var(--text-primary) !important;
        }

        /* Markdown rendered as description */
        .swagger-ui .renderedMarkdown p {
            color: var(--text-muted) !important;
        }

        .swagger-ui .renderedMarkdown code {
            background: var(--bg-primary) !important;
            color: var(--accent) !important;
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #3d4260;
        }
    </style>
</head>

<body>
    <div class="docguard-header">
        <div class="logo-icon">🛡</div>
        <h1>DocGuard AI</h1>
        <span class="subtitle">API Documentation</span>
        <a href="/" class="back-link">← Back to App</a>
    </div>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script>
        SwaggerUIBundle({
            url: "/apispec.json",
            dom_id: "#swagger-ui",
            presets: [
                SwaggerUIBundle.presets.apis,
                SwaggerUIBundle.SwaggerUIStandalonePreset,
            ],
            layout: "BaseLayout",
            deepLinking: true,
            displayRequestDuration: true,
            persistAuthorization: true,
            filter: true,
            tagsSorter: "alpha",
            operationsSorter: "alpha",
            defaultModelsExpandDepth: 0,
            docExpansion: "list",
        });
    </script>
</body>

</html>
