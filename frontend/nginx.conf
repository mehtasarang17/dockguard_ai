# When the Referer is /apidocs (Swagger UI), do NOT inject the internal token.
# This forces Swagger users to authenticate with a real API key.
# The main app frontend never sets a Referer matching "apidocs".
map $http_referer $internal_token_for_api {
    ~*apidocs   "";
    default     $INTERNAL_TOKEN;
}

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Disable caching for HTML and JS files so updates are always picked up
    location ~* \.(html|js|css)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
        try_files $uri $uri/ /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # SSE streaming for Ollama model pull progress
    location /api/ollama/pull {
        proxy_pass http://doc-analyzer-backend-v2:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Internal-Token $internal_token_for_api;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        chunked_transfer_encoding off;
        client_max_body_size 1M;
    }

    # Swagger UI — served as a static HTML page
    location = /apidocs {
        add_header Cache-Control "no-cache";
        try_files /apidocs.html =404;
    }

    # OpenAPI spec — served by Flask backend (public, no internal token)
    location = /apispec.json {
        proxy_pass http://doc-analyzer-backend-v2:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Cache-Control "no-cache";
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://doc-analyzer-backend-v2:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        client_max_body_size 200M;
        # Prevent browser from caching API responses
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        # Internal token: only injected for the main app, NOT for Swagger requests
        proxy_set_header X-Internal-Token $internal_token_for_api;
    }

    location /health {
        proxy_pass http://doc-analyzer-backend-v2:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Internal-Token $INTERNAL_TOKEN;
    }
}
